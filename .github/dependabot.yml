# Keep the SHA-pinned GitHub Actions current. Actions are pinned to commit SHAs
# (with a version comment) in the workflows for supply-chain safety; Dependabot
# bumps those SHAs when a new release lands and updates the comment, so pinning
# doesn't mean going stale.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
