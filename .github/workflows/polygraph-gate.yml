# Dogfood gate: on every PR, fail the build if an MCP server this project declares
# grades D/F under the open behavioral litmus. Scoped to plugins/polygraph, whose
# .mcp.json declares the polygraph MCP server (npx -p @polygraphso/litmus → npm/
# @polygraphso/litmus, graded A). Scoping keeps the repo's intentionally-malformed
# demo skill fixtures (packages/probes/test-fixtures/) out of the gate.
name: polygraph-gate
on: [pull_request]
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./   # gate with this repo's own action.yml (validates it on every PR)
        with:
          working-directory: plugins/polygraph
          # Run the latest PUBLISHED package, not action.yml's default pin — so the
          # gate doesn't fail on release PRs that bump the pin to an unpublished version.
          version: latest
