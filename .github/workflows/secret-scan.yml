name: Secret scan

# This repository is public-by-design. gitleaks runs on every push and pull
# request and fails the build if any secret-shaped content is found, across the
# full git history. Run it locally before pushing with: gitleaks detect --no-banner
#
# We run the gitleaks binary directly rather than gitleaks-action, because the
# action requires a paid license for organization-owned repos.

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the scan covers every commit

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history
        run: gitleaks detect --no-banner --redact --verbose
