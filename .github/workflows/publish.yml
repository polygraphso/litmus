name: Publish @polygraphso/litmus

# Publishes the bundled litmus package to npm when a tag like `litmus-v0.2.0` is
# pushed. This repo is the harness only; the tag is package-scoped by convention.
# Tag the version you set in packages/litmus/package.json:
#   git tag litmus-v0.2.0 && git push origin litmus-v0.2.0
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights to
# the @polygraphso scope).

on:
  push:
    tags:
      - "litmus-v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm --filter @polygraphso/litmus build

      # Ref guard: only publish from a litmus-v* TAG, never from a workflow_dispatch
      # on an arbitrary branch. workflow_dispatch can still run the build/test steps
      # above (a safe dry-run), but the publish step is skipped unless the ref is a
      # release tag — so an actor with write access can't ship unreviewed code by
      # dispatching from their branch.
      # TODO (manual): migrate to npm Trusted Publishing (OIDC) and drop the
      # long-lived NPM_TOKEN — id-token: write is already granted; it also needs
      # the pnpm-10 bump.
      - name: Publish
        if: startsWith(github.ref, 'refs/tags/litmus-v')
        run: pnpm --filter @polygraphso/litmus publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
