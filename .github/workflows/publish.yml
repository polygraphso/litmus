name: Publish @polygraphso/litmus

# Publishes the bundled litmus package to npm when a tag like `litmus-v0.1.0` is
# pushed. The repo also holds web/ and contracts/, so the tag is package-scoped.
# Tag the version you set in packages/litmus/package.json:
#   git tag litmus-v0.1.0 && git push origin litmus-v0.1.0
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights to
# the @polygraphso scope).

on:
  push:
    tags:
      - "litmus-v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm --filter @polygraphso/litmus build

      # Ref guard: only publish from a litmus-v* TAG, never from a workflow_dispatch
      # on an arbitrary branch. workflow_dispatch can still run the build/test steps
      # above (a safe dry-run), but the publish step is skipped unless the ref is a
      # release tag — so an actor with write access can't ship unreviewed code by
      # dispatching from their branch.
      # TODO (manual, see plans/security-fixes-2026-06.md): migrate to npm Trusted
      # Publishing (OIDC) and drop the long-lived NPM_TOKEN — id-token: write is
      # already granted; it also needs the pnpm-10 bump.
      - name: Publish
        if: startsWith(github.ref, 'refs/tags/litmus-v')
        run: pnpm --filter @polygraphso/litmus publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
