name: Publish @polygraphso/litmus

# Publishes the bundled litmus package to npm when a tag like `litmus-v0.2.0` is
# pushed, then pushes server.json to the official MCP registry so the public
# listing tracks the release. This repo is the harness only; the tag is
# package-scoped by convention. Tag the version you set in
# packages/litmus/package.json:
#   git tag litmus-v0.2.0 && git push origin litmus-v0.2.0
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights to
# the @polygraphso scope). The MCP-registry publish needs no secret (GitHub OIDC).

on:
  push:
    tags:
      - "litmus-v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm --filter @polygraphso/litmus build

      # Ref guard: only publish from a litmus-v* TAG, never from a workflow_dispatch
      # on an arbitrary branch. workflow_dispatch can still run the build/test steps
      # above (a safe dry-run), but the publish step is skipped unless the ref is a
      # release tag — so an actor with write access can't ship unreviewed code by
      # dispatching from their branch.
      # TODO (manual): migrate to npm Trusted Publishing (OIDC) and drop the
      # long-lived NPM_TOKEN — id-token: write is already granted; it also needs
      # the pnpm-10 bump.
      - name: Publish
        if: startsWith(github.ref, 'refs/tags/litmus-v')
        run: pnpm --filter @polygraphso/litmus publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Push server.json to the official MCP registry (registry.modelcontextprotocol.io)
  # so the listing tracks the npm release instead of going stale. Runs after a
  # successful npm publish on a litmus-v* tag, or via workflow_dispatch from main
  # only — the same guard idea as above: no listing changes from arbitrary branches.
  # Auth is GitHub OIDC (no secret): the registry grants io.github.polygraphso/*
  # to workflows running in this org.
  publish-registry:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/litmus-v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC login to the MCP registry
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The release flow bumps package.json and server.json together; fail fast if
      # they drifted, since publishing a stale server.json is exactly the bug this
      # job exists to prevent.
      - name: Check server.json matches the released version
        run: |
          PKG_VERSION=$(jq -r .version packages/litmus/package.json)
          MANIFEST_VERSION=$(jq -r .version server.json)
          PACKAGE_REF_VERSION=$(jq -r '.packages[0].version' server.json)
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ] || [ "$PKG_VERSION" != "$PACKAGE_REF_VERSION" ]; then
            echo "server.json ($MANIFEST_VERSION / $PACKAGE_REF_VERSION) does not match packages/litmus/package.json ($PKG_VERSION)" >&2
            exit 1
          fi

      # Unpinned "latest" is deliberate: the registry rejects stale publisher
      # binaries ("invalid audience"), and upstream's guidance is to always
      # install the latest release.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      # Retry: on a fresh tag the npm publish a moment ago may not be visible to
      # the registry's package validation yet.
      - name: Publish server to MCP Registry
        run: |
          for attempt in 1 2 3; do
            ./mcp-publisher publish && exit 0
            echo "publish attempt $attempt failed; retrying in 20s" >&2
            sleep 20
          done
          exit 1
