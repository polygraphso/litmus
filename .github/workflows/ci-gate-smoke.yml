# Manual smoke test of the PUBLISHED polygraph MCP gate Action against this repo's
# own committed fixtures — proves `uses: polygraphso/litmus@v1` actually gates a
# build end to end (the unit + integration tests cover the grading logic; this
# covers the Action wrapper + the published CLI running in real GitHub Actions).
# Run it after a release that includes the `ci` command is on npm.
name: ci-gate-smoke
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gate-fails-on-bad-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate a known-bad skill (the gate is expected to FAIL the build)
        id: gate
        continue-on-error: true
        uses: polygraphso/litmus@v1
        with:
          discover: "false"
          skills: packages/probes/test-fixtures/demo-evil-skill
      - name: Assert the gate failed the build
        run: |
          echo "gate step outcome: ${{ steps.gate.outcome }}"
          test "${{ steps.gate.outcome }}" = "failure" || {
            echo "::error::expected the gate to FAIL on the evil skill, got '${{ steps.gate.outcome }}'"
            exit 1
          }
          echo "the action correctly failed the build on a D/F skill"
